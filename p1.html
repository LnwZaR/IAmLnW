
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>My Gallery</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    margin: 0;
    padding: 20px;
}

/* หัวข้อ */
h1 {
    color: white;
    text-align: center;
    margin-bottom: 30px;
}

/* grid แกลลอรี่ */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

/* การ์ดรูป */
.card {
    overflow: hidden;
    border-radius: 15px;
    position: relative;
    cursor: pointer;
}

/* รูป */
.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    transition: 0.4s;
}

/* เอฟเฟกต์ hover */
.card:hover img {
    transform: scale(1.1);
}

/* ข้อความบนรูป */
.card .info {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    text-align: center;
    padding: 10px;
    transform: translateY(100%);
    transition: 0.4s;
}

/* แสดงข้อความตอน hover */
.card:hover .info {
    transform: translateY(0);
}
</style>

</head>
<body>

<h1>📸 My Gallery</h1>

<div class="gallery">

    <div class="card">
        <img src="kuy.jpg">
        <div class="info">ไรวะ</div>
    </div>

    <div class="card">
        <img src="S__21717003.jpg">
        <div class="info">ระไว</div>
    </div>

    <div class="card">
        <img src="S__21717000.jpg">
        <div class="info">ไครวย</div>
    </div>

    <div class="card">
        <img src="S__21716998.jpg">
        <div class="info">มวยป่ะ</div>
    </div>

</div>

</body>
</html>
